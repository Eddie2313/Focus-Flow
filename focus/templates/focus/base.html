{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>FocusFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'focus/style.css' %}">
</head>

<body>
<div class="app-layout">

    <aside class="sidebar">
        <h1 class="logo">Focus<span>Flow</span></h1>

        <nav class="side-nav">
            <a href="{% url 'dashboard' %}" class="active">⏱ Timer</a>
            <a href="{% url 'tasks' %}">☑ Tasks</a>
            <a href="{% url 'stats' %}">▥ Stats</a>
            <a href="{% url 'settings' %}">⚙ Settings</a>
                {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
                 {% else %}
            <a href="{% url 'login' %}">Login</a>
                 {% endif %}
        </nav>

        <p class="quote">Discipline today,<br>freedom tomorrow.</p>
    </aside>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

</div>
</body>
</html>
